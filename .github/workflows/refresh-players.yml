name: Monthly Player Data Refresh

on:
  schedule:
    # Run at 8:00 AM UTC on the 1st of every month
    - cron: "0 8 1 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run player data fetch
        env:
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/fetch-players.ts

      - name: Run team cap data fetch
        run: npx tsx scripts/fetch-teams.ts

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json data/teams.json
          if git diff --cached --quiet; then
            echo "No changes to data files — skipping commit"
          else
            git commit -m "Auto-refresh: update player and team cap data ($(date -u '+%Y-%m-%d'))"
            git push
          fi
